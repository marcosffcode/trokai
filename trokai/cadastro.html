<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trokaí – Criar conta</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .cadastro-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      cursor: pointer;
    }

    .cadastro-logo span {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--green);
    }

    .cadastro-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: fadeUp 0.4s ease;
    }

    .cadastro-card h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cadastro-card > p {
      font-size: 0.875rem;
      color: var(--gray-400);
      margin-bottom: 24px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--gray-400);
    }

    .login-link a { color: var(--blue); font-weight: 700; }

    #msgErro {
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      color: #c62828;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 600;
      display: none;
      margin-bottom: 16px;
    }

    .terms-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--gray-600);
      margin-bottom: 20px;
    }

    .terms-check input { margin-top: 2px; accent-color: var(--blue); }
    .terms-check a { color: var(--blue); font-weight: 600; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cadastro-logo" onclick="window.location.href='index.html'">
    <svg width="36" height="36" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#00C853"/>
      <rect x="27" y="30" width="18" height="15" rx="3" fill="white"/>
      <path d="M30 30V26C30 22.7 32.7 20 36 20C39.3 20 42 22.7 42 26V30" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M18 55C18 55 27 48 36 48C45 48 54 55 54 55" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span>Trokaí</span>
  </div>

  <div class="cadastro-card">
    <h2>Criar sua conta</h2>
    <p>Comece a trocar e doar itens na sua região</p>

    <div id="msgErro"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nome <span style="color:#e53935">*</span></label>
        <input type="text" id="nome" class="form-control" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label class="form-label">Sobrenome</label>
        <input type="text" id="sobrenome" class="form-control" placeholder="Sobrenome">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email <span style="color:#e53935">*</span></label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">WhatsApp / Telefone</label>
      <input type="tel" id="telefone" class="form-control" placeholder="(63) 9 9999-9999">
    </div>

    <div class="form-group">
      <label class="form-label">Bairro / Cidade <span style="color:#e53935">*</span></label>
      <input type="text" id="bairro" class="form-control" placeholder="Ex: Plano Diretor Sul, Palmas-TO">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Senha <span style="color:#e53935">*</span></label>
        <input type="password" id="senha" class="form-control" placeholder="Min. 6 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha <span style="color:#e53935">*</span></label>
        <input type="password" id="confirmar" class="form-control" placeholder="Repita a senha">
      </div>
    </div>

    <div class="terms-check">
      <input type="checkbox" id="termos">
      <label for="termos">Concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade (LGPD)</a></label>
    </div>

    <button class="btn btn-primary btn-full btn-lg" onclick="fazerCadastro()">Criar conta grátis</button>

    <div class="login-link">
      Já tem uma conta? <a href="index.html">Entrar</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (Auth.user) window.location.href = 'home.html';

    function fazerCadastro() {
      const nome = (document.getElementById('nome').value + ' ' + document.getElementById('sobrenome').value).trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;
      const termos = document.getElementById('termos').checked;
      const msg = document.getElementById('msgErro');

      if (!termos) {
        msg.textContent = 'Você precisa aceitar os Termos de Uso.';
        msg.style.display = 'block';
        return;
      }

      const result = Auth.cadastrar({ nome, email, senha, confirmar });
      if (!result.ok) {
        msg.textContent = result.msg;
        msg.style.display = 'block';
        return;
      }
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
