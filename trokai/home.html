<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trokaí – Início</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 50px;
      border: 2px solid var(--gray-200);
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-chip:hover { border-color: var(--blue); color: var(--blue); }
    .filter-chip.active { background: var(--blue); border-color: var(--blue); color: white; }

    .result-info {
      font-size: 0.875rem;
      color: var(--gray-400);
      margin-bottom: 16px;
    }

    .result-info strong { color: var(--dark); }

    .empty-search {
      grid-column: 1/-1;
    }

   
    .sidebar-toggle {
      display: none;
      background: white;
      border: 2px solid var(--gray-200);
      padding: 8px 14px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      align-items: center;
      gap: 6px;
      color: var(--gray-600);
    }

    @media (max-width: 768px) {
      .sidebar-toggle { display: flex; margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="app-layout">
    
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Categorias</div>
        <div id="catList"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Tipo</div>
        <div id="intencaoList">
          <div class="cat-item" data-intencao="" onclick="setIntencao(this, '')">
            <span class="cat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span> Todos
            <input type="checkbox" style="margin-left:auto" checked id="chkTodos">
          </div>
          <div class="cat-item" data-intencao="Trocar" onclick="setIntencao(this, 'Trocar')">
            <span class="cat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span> Trocar
            <input type="checkbox" style="margin-left:auto" id="chkTrocar">
          </div>
          <div class="cat-item" data-intencao="Doar" onclick="setIntencao(this, 'Doar')">
            <span class="cat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span> Doar
            <input type="checkbox" style="margin-left:auto" id="chkDoar">
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Condição</div>
        <div id="condicaoList">
          ${['Novo','Seminovo','Bom estado','Com defeito'].map(c => `
            <div class="cat-item">
              <span style="font-size:0.85rem">${c}</span>
              <input type="checkbox" style="margin-left:auto" onchange="aplicarFiltros()">
            </div>
          `).join('')}
        </div>
      </div>
    </aside>

    
    <main class="main-content">
      
      <div class="featured-strip" id="featuredStrip"></div>
      <div class="filter-chips" id="filterChips"></div>
      <div class="section-header">
        <span class="section-title" id="sectionTitle">Todos os itens</span>
        <span class="result-info" id="resultInfo"></span>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderNavbar();

    const params = new URLSearchParams(window.location.search);
    let filtros = {
      categoria: params.get('cat') || '',
      q: params.get('q') || '',
      intencao: ''
    };

    const catList = document.getElementById('catList');
    CATEGORIAS.forEach(cat => {
      const el = document.createElement('div');
      el.className = 'cat-item' + (filtros.categoria === cat.id ? ' active' : '');
      el.dataset.cat = cat.id;
      el.innerHTML = `
        <span class="cat-icon">${cat.icon}</span>
        <span style="font-size:0.85rem">${cat.nome}</span>
        <input type="checkbox" style="margin-left:auto" ${filtros.categoria === cat.id ? 'checked' : ''}>
      `;
      el.addEventListener('click', () => setCategoria(cat.id, el));
      catList.appendChild(el);
    });

    
    const todosEl = document.createElement('div');
    todosEl.className = 'cat-item' + (!filtros.categoria ? ' active' : '');
    todosEl.innerHTML = `<span class="cat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span><span style="font-size:0.85rem">Todas as categorias</span><input type="checkbox" style="margin-left:auto" ${!filtros.categoria ? 'checked' : ''}>`;
    todosEl.addEventListener('click', () => setCategoria('', todosEl));
    catList.prepend(todosEl);

    
    const filterChips = document.getElementById('filterChips');
    CATEGORIAS.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (filtros.categoria === cat.id ? ' active' : '');
      chip.innerHTML = `<span style='display:inline-flex;align-items:center;gap:4px'>${cat.icon}${cat.nome.split(' ')[0]}</span>`;
      chip.addEventListener('click', () => {
        const isSame = filtros.categoria === cat.id;
        setCategoria(isSame ? '' : cat.id);
      });
      filterChips.appendChild(chip);
    });

    
    const strip = document.getElementById('featuredStrip');
    const destaquesData = [
      { label: 'Livros', svgIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`, cor: '#E8F4FF' },
      { label: 'Eletrônicos', svgIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`, cor: '#F0FFF4' },
      { label: 'Roupas', svgIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>`, cor: '#FFF8E8' },
      { label: 'Brinquedos', svgIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14.5v5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><rect x="9" y="10" width="6" height="5" rx="1"/></svg>`, cor: '#FFF0F8' },
      { label: 'Móveis', svgIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="12" rx="1"/><path d="M3 15h18"/><path d="M8 21V15"/><path d="M16 21V15"/></svg>`, cor: '#F0F8FF' },
    ];
    destaquesData.forEach(d => {
      const el = document.createElement('div');
      el.className = 'featured-card';
      el.style.background = d.cor;
      el.style.display = 'flex';
      el.style.alignItems = 'center';
      el.style.justifyContent = 'center';
      el.style.fontSize = '3rem';
      el.innerHTML = `<span style="font-size:2rem;display:flex;align-items:center;justify-content:center">${d.svgIcon}</span><span class="featured-card-label">${d.label}</span>`;
      strip.appendChild(el);
    });

    
    function renderProdutos() {
      const lista = ProdutosDB.listar(filtros);
      const grid = document.getElementById('productGrid');
      const title = document.getElementById('sectionTitle');
      const info = document.getElementById('resultInfo');

      const cat = CATEGORIAS.find(c => c.id === filtros.categoria);
      title.textContent = filtros.q
        ? `Resultados para "${filtros.q}"`
        : cat
          ? `${cat.icon} ${cat.nome}`
          : 'Todos os itens';

      info.textContent = `${lista.length} item${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

      grid.innerHTML = '';

      if (lista.length === 0) {
        grid.innerHTML = `
          <div class="empty-state empty-search">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <h3>Nenhum item encontrado</h3>
            <p>Tente outros termos ou categorias</p>
            <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="limparFiltros()">Limpar filtros</button>
          </div>`;
        return;
      }

      lista.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => window.location.href = `produto.html?id=${p.id}`;
        const intencaoClass = p.intencao === 'Doar' ? 'badge-doacao' : 'badge-troca';
        card.innerHTML = `
          <div class="product-img">
            <div class="product-img-placeholder">
              <span class="cat-svg-icon">${getCatIcon(p.categoria)}</span>
            </div>
            <span class="product-badge ${intencaoClass}">${p.intencao}</span>
          </div>
          <div class="product-info">
            <div class="product-title">${p.titulo}</div>
            <div class="product-meta">
              <span class="product-location">${Icons.location} ${p.bairro?.split(' ').slice(0,2).join(' ')}</span>
              <span class="product-condition">${p.condicao}</span>
            </div>
            <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
              <div class="avatar avatar-sm" style="width:24px;height:24px;font-size:0.7rem">${p.usuario.avatar}</div>
              <span style="font-size:0.75rem;color:var(--gray-600);font-weight:600">${p.usuario.nome}</span>
              <div class="stars" style="margin-left:auto;font-size:0.7rem">
                ${Icons.star}<span class="stars-text">${p.usuario.nota}</span>
              </div>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function getCatIcon(catId) {
      const cat = CATEGORIAS.find(c => c.id === catId);
      return cat ? cat.icon : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;
    }

    function setCategoria(id, el) {
      filtros.categoria = id;
      
      document.querySelectorAll('#catList .cat-item').forEach(item => {
        item.classList.remove('active');
        item.querySelector('input').checked = false;
      });
      if (el) { el.classList.add('active'); el.querySelector('input').checked = true; }
      
      document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
      renderProdutos();
    }

    function setIntencao(el, val) {
      filtros.intencao = val;
      document.querySelectorAll('#intencaoList .cat-item').forEach(i => {
        i.classList.remove('active');
        i.querySelector('input').checked = false;
      });
      el.classList.add('active');
      el.querySelector('input').checked = true;
      renderProdutos();
    }

    function aplicarFiltros() { renderProdutos(); }

    function limparFiltros() {
      filtros = { categoria: '', q: '', intencao: '' };
      document.getElementById('searchInput').value = '';
      renderProdutos();
    }

    renderProdutos();
  </script>
</body>
</html>
