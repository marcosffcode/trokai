<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trokaí – Entrar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeDown 0.5s ease;
    }

    .login-logo svg { filter: drop-shadow(0 4px 16px rgba(0,200,83,0.4)); }

    .login-logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -1px;
    }

    .login-tagline {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      margin-top: -8px;
      text-align: center;
    }

    .login-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .login-card h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.875rem;
      color: var(--gray-400);
      margin-bottom: 24px;
    }

    .divider {
      text-align: center;
      color: var(--gray-400);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--gray-200);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--gray-400);
    }

    .login-footer a { color: var(--blue); font-weight: 700; }

    .forgot {
      text-align: right;
      font-size: 0.8rem;
      margin-top: -12px;
      margin-bottom: 20px;
    }

    .forgot a { color: var(--blue); font-weight: 600; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-icon {
      position: relative;
    }

    .input-icon input {
      padding-left: 44px;
    }

    .input-icon .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
    }

    .toggle-senha {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      padding: 4px;
    }

    #msgErro {
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      color: #c62828;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 600;
      display: none;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div class="login-logo">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#00C853"/>
      <path d="M36 14L50 24V40L36 50L22 40V24L36 14Z" fill="white" opacity="0.25"/>
      <rect x="27" y="30" width="18" height="15" rx="3" fill="white"/>
      <path d="M30 30V26C30 22.7 32.7 20 36 20C39.3 20 42 22.7 42 26V30" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M18 55C18 55 27 48 36 48C45 48 54 55 54 55" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span class="login-logo-text">Trokaí</span>
    <span class="login-tagline">Troque e doe itens com quem está perto de você</span>
  </div>

  <div class="login-card">
    <h2>Bem-vindo de volta!</h2>
    <p>Entre na sua conta para continuar</p>

    <div id="msgErro"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-icon">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="input-icon" style="position:relative">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="senha" class="form-control" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="toggle-senha" onclick="toggleSenha()">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="forgot"><a href="#">Esqueceu a senha?</a></div>

    <button class="btn btn-primary btn-full btn-lg" onclick="fazerLogin()">Entrar</button>

    <div class="divider">ou</div>

    <div class="login-footer">
      Não tem uma conta? <a href="cadastro.html">Criar conta grátis</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    
    if (Auth.user) window.location.href = 'home.html';

    function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('msgErro');

      const result = Auth.login(email, senha);
      if (!result.ok) {
        msg.textContent = result.msg;
        msg.style.display = 'block';
        return;
      }
      msg.style.display = 'none';
      window.location.href = 'home.html';
    }

    
    ['email', 'senha'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') fazerLogin();
      });
    });

    function toggleSenha() {
      const input = document.getElementById('senha');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
